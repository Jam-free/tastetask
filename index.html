<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>记忆测试集 · Memory Test Suite</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#ffffff;--bg-secondary:#f8f8f8;--bg-tertiary:#f2f2f2;
  --text-primary:#111111;--text-secondary:#666666;--text-tertiary:#999999;
  --border-light:#f0f0f0;--border-mid:#e0e0e0;--border-strong:#cccccc;
  --accent:#4F46E5;--accent-dark:#4338CA;--accent-light:rgba(79,70,229,.08);
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg-primary:#1c1c1e;--bg-secondary:#2c2c2e;--bg-tertiary:#141414;
    --text-primary:#f2f2f7;--text-secondary:#aeaeb2;--text-tertiary:#636366;
    --border-light:#2c2c2e;--border-mid:#3a3a3c;--border-strong:#48484a;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif;background:var(--bg-tertiary);min-height:100vh;color:var(--text-primary)}
.app{max-width:800px;margin:0 auto;padding:0 0 80px}
.nav{display:flex;gap:4px;padding:12px 16px;background:var(--bg-primary);border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:100;align-items:center}
.nav-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-right:12px}
.nav-btn{padding:7px 16px;border-radius:20px;border:1px solid transparent;font-size:13px;cursor:pointer;background:transparent;color:var(--text-secondary);transition:all .15s;font-family:inherit}
.nav-btn.active{background:var(--bg-primary);border-color:var(--border-strong);color:var(--text-primary);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.nav-btn:hover:not(.active){background:var(--bg-secondary)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
/* stats */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:16px}
.stat-card{background:var(--bg-primary);border-radius:var(--radius-md);border:1px solid var(--border-light);padding:14px;text-align:center}
.stat-card .n{font-size:22px;font-weight:600}
.stat-card .l{font-size:11px;color:var(--text-secondary);margin-top:2px}
/* flashcard */
.card-area{padding:24px 16px;display:flex;flex-direction:column;align-items:center;min-height:500px}
.progress-bar{width:100%;max-width:520px;height:3px;background:var(--border-light);border-radius:2px;margin-bottom:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.progress-text{font-size:12px;color:var(--text-tertiary);width:100%;max-width:520px;text-align:right;margin-bottom:16px}
.card-stack{position:relative;width:100%;max-width:520px;height:360px}
.card-behind{position:absolute;width:100%;border-radius:var(--radius-lg);background:var(--bg-primary);border:1px solid var(--border-mid)}
.card-behind-2{top:10px;left:8px;right:8px;height:340px;opacity:.35}
.card-behind-1{top:5px;left:4px;right:4px;height:350px;opacity:.65}
.card-main{position:absolute;top:0;left:0;right:0;height:360px;border-radius:var(--radius-lg);background:var(--bg-primary);border:1px solid var(--border-mid);cursor:grab;user-select:none;transition:box-shadow .15s;box-shadow:0 2px 16px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.card-main:active{cursor:grabbing}
.card-header{padding:18px 22px 12px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.card-body{flex:1;padding:18px 22px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto}
.card-query{font-size:21px;font-weight:500;color:var(--text-primary);line-height:1.4;margin-bottom:8px}
.card-hint{font-size:13px;color:var(--text-tertiary);margin-top:14px}
.card-footer{padding:10px 22px;border-top:1px solid var(--border-light);display:flex;gap:12px;font-size:11px;color:var(--text-tertiary);flex-wrap:wrap}
.card-answer-section{margin-bottom:12px}
.card-answer-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-tertiary);margin-bottom:5px}
.card-answer-text{font-size:13px;color:var(--text-primary);line-height:1.65;background:var(--bg-secondary);border-radius:var(--radius-sm);padding:10px 13px;white-space:pre-wrap}
.swipe-indicator{position:absolute;top:50%;transform:translateY(-50%);font-size:28px;font-weight:700;opacity:0;transition:opacity .08s;pointer-events:none}
.swipe-left-ind{left:18px;color:#ef4444}
.swipe-right-ind{right:18px;color:#22c55e}
.controls{display:flex;align-items:center;gap:16px;margin-top:22px}
.ctrl-btn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border-mid);background:var(--bg-primary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;color:var(--text-primary)}
.ctrl-btn:hover{background:var(--bg-secondary);transform:scale(1.06)}
.ctrl-btn:active{transform:scale(.94)}
.ctrl-btn.primary{width:56px;height:56px;border-width:1.5px;border-color:var(--border-strong)}
.done-card{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;border-radius:var(--radius-lg);background:var(--bg-primary);border:1px solid var(--border-mid);height:360px}
/* table */
.table-wrap{padding:16px}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-select{padding:7px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-mid);background:var(--bg-primary);font-size:13px;color:var(--text-primary);cursor:pointer;font-family:inherit}
.tbl-container{border-radius:var(--radius-md);border:1px solid var(--border-light);background:var(--bg-primary);overflow:hidden}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{padding:10px 13px;text-align:left;font-weight:500;font-size:11px;color:var(--text-secondary);background:var(--bg-secondary);border-bottom:1px solid var(--border-mid);white-space:nowrap}
.tbl td{padding:10px 13px;border-bottom:1px solid var(--border-light);vertical-align:top;color:var(--text-primary);line-height:1.5}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg-secondary)}
.expand-btn{background:none;border:none;cursor:pointer;color:var(--accent);font-size:12px;padding:3px 8px;border-radius:6px;font-family:inherit}
.expand-btn:hover{background:var(--accent-light)}
.expand-detail{background:var(--bg-secondary);padding:14px 16px;border-bottom:1px solid var(--border-light)}
.expand-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;font-size:12px}
.expand-label{font-weight:500;color:var(--text-secondary);margin-bottom:4px;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.expand-val{color:var(--text-primary);line-height:1.6;white-space:pre-wrap}
/* add form */
.add-wrap{padding:20px 16px;max-width:620px}
.add-section-title{font-size:15px;font-weight:500;color:var(--text-primary);margin-bottom:16px}
.add-form{background:var(--bg-primary);border-radius:var(--radius-lg);border:1px solid var(--border-light);padding:24px;display:flex;flex-direction:column;gap:16px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:13px;font-weight:500;color:var(--text-secondary)}
.form-label .req{color:#ef4444;margin-left:2px}
.form-input,.form-select,.form-textarea{padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border-mid);background:var(--bg-primary);font-size:14px;color:var(--text-primary);font-family:inherit;transition:border-color .15s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.upload-zone{border:1.5px dashed var(--border-mid);border-radius:var(--radius-md);padding:28px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg-secondary)}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-light)}
.upload-zone .up-icon{font-size:24px;margin-bottom:6px}
.upload-zone p{font-size:13px;color:var(--text-secondary)}
.upload-zone .sub{font-size:11px;color:var(--text-tertiary);margin-top:3px}
.card-img-prev{max-width:100%;border-radius:var(--radius-sm);max-height:130px;object-fit:cover}
.submit-btn{padding:11px;border-radius:var(--radius-md);background:var(--accent);color:#fff;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:all .15s;font-family:inherit}
.submit-btn:hover{background:var(--accent-dark)}
.submit-btn:active{transform:scale(.98)}
.user-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:5px;vertical-align:middle}
/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 22px;border-radius:24px;font-size:13px;pointer-events:none;z-index:9999;opacity:0;transition:opacity .25s;white-space:nowrap}
.toast.show{opacity:1}
.card-img{max-width:100%;border-radius:var(--radius-sm);margin-top:10px;max-height:110px;object-fit:cover}
.empty{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:14px}
.done-emoji{font-size:36px}
.done-title{font-size:16px;font-weight:500;color:var(--text-primary)}
.done-sub{font-size:13px;color:var(--text-secondary)}
.reset-btn{padding:8px 20px;border-radius:20px;border:1px solid var(--border-mid);background:transparent;cursor:pointer;font-size:13px;color:var(--text-primary);font-family:inherit;transition:all .15s}
.reset-btn:hover{background:var(--bg-secondary)}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast" class="toast"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

const LEVEL_STYLE={
  L1:{bg:'#ECFDF5',color:'#065F46'},
  L2:{bg:'#FFFBEB',color:'#92400E'},
  L3:{bg:'#FFF7ED',color:'#9A3412'},
  L4:{bg:'#FEF2F2',color:'#991B1B'},
  L5:{bg:'#F5F3FF',color:'#4C1D95'},
};
const SHEET_COLOR={
  '对话记忆':'#10B981',
  '本机·日历':'#3B82F6',
  '本机·备忘录':'#F59E0B',
  '本机·短信':'#8B5CF6',
  '本机·联系人':'#EC4899',
  '本机·图库':'#06B6D4',
  '本机·文件':'#78716C',
  '多数据源':'#EF4444',
  '边界负样本':'#6B7280',
};
const SHEET_OPTIONS=Object.keys(SHEET_COLOR);

const PRESET=[
  {id:'XY-01',query:'我家的地址在哪里？',level:'L1',sheet:'对话记忆',source:'对话记忆',
   preset:'对话记忆：「帮我记一下，我家住上海市浦东新区张江路100号XX小区3栋502室」',
   golden:'您家的地址是：上海市浦东新区张江路100号XX小区3栋502室。',
   skill:'单条记忆语义直接召回',note:'基准用例，无推理'},
  {id:'XY-02',query:'我老婆生日是哪天？',level:'L1',sheet:'对话记忆',source:'对话记忆',
   preset:'对话记忆：「记一下，我老婆生日是3月15日」',
   golden:'您老婆的生日是3月15日。',
   skill:'关系人属性直接召回',note:'基准，无推理'},
  {id:'XY-07',query:'童童的生日是哪天？',level:'L2',sheet:'对话记忆',source:'对话记忆',
   preset:'记忆1：「我女儿叫童童」\n记忆2：「女儿生日是6月2日」',
   golden:'童童（您的女儿）生日是6月2日。',
   skill:'别名识别 + 单跳属性关联',note:'需先将「童童」关联到「女儿」'},
  {id:'XY-10',query:'今天我的车去杭州是否限行？',level:'L2',sheet:'对话记忆',source:'对话记忆',
   preset:'对话记忆：「我的车牌是浙A·12345，尾号5」\n外部数据：杭州今日限行尾号3和8',
   golden:'您的车牌尾号是5，杭州今日限行尾号3和8，您的车不限行，可正常出行。',
   skill:'记忆填槽 + 外部规则推理',note:'需调取车牌记忆，结合限行规则判断'},
  {id:'XY-11',query:'童童是什么星座？',level:'L3',sheet:'对话记忆',source:'对话记忆',

   skill:'多跳推理：别名→关系→生日→星座',note:'3跳推理，日期换算是难点'},
  {id:'XY-13',query:'下次我要给老婆买生日礼物，她喜欢什么？',level:'L3',sheet:'对话记忆',source:'对话记忆',
   preset:'记忆1：老婆生日3月15日\n记忆2：老婆喜欢香薰蜡烛和手账\n记忆3：老婆讨厌收到口红',
   golden:'您老婆生日3月15日，她喜欢香薰蜡烛和手账，不喜欢口红，可以朝这个方向选礼物。',
   skill:'多条偏好记忆聚合 + 正负向综合',note:'需综合正向偏好和负向偏好'},
  {id:'XY-14',query:'我最近记过什么重要日期？',level:'L4',sheet:'对话记忆',source:'对话记忆',
   preset:'记忆1：老婆生日3月15日\n记忆2：女儿生日6月2日\n记忆3：妈妈生日9月20日\n记忆4：结婚纪念日11月11日',
   golden:'记录的重要日期：老婆生日3月15日、女儿生日6月2日、妈妈生日9月20日、结婚纪念日11月11日。',
   skill:'多条记忆聚合 + 主题归类',note:'需识别「重要日期」主题，过滤归类'},
  {id:'XY-16',query:'帮我统计一下我这周记过的账单',level:'L5',sheet:'对话记忆',source:'对话记忆',
   preset:'记忆含时间戳：周一早餐18元、周二打车35元、周三午餐52元+咖啡28元、周四超市143元、周五外卖45元',
   golden:'本周账单6笔，合计321元：\n周一 早餐 18元\n周二 打车 35元\n周三 午餐 52元 / 咖啡 28元\n周四 超市 143元\n周五 外卖 45元',
   skill:'时间范围推算 + 多条聚合 + 求和',note:'需识别「这周」时间范围，筛选聚合'},
  {id:'DJ-01',query:'我明天有哪些事儿？',level:'L1',sheet:'本机·日历',source:'系统日历',
   preset:'日历事件（明日）：09:00产品周会（腾讯会议）、14:00牙科复查（仁济医院）、19:30同学聚餐（外滩18号）',

   skill:'时间锚点推算（明天）+ 多事件列举',note:'基准日历用例，无需推理'},
  {id:'DJ-04',query:'女儿今天要不要上书法课？',level:'L2',sheet:'本机·日历',source:'系统日历',
   preset:'日历事件：每周二、四 16:30「童童书法课·墨香书法班」',
   golden:'（若今天是周二/四）今天有书法课，16:30在墨香书法班。\n（其他日）今天没有书法课，下次是周X。',
   skill:'今日星期推算 + 周期事件匹配',note:'需判断今天是否在周二/四的周期内'},
  {id:'DJ-08',query:'正月初六同学聚会的饭店在哪儿？',level:'L3',sheet:'本机·日历',source:'系统日历',
   preset:'日历事件（农历正月初六对应公历，19:00）：「同学聚会·新荣记（静安寺店）」',
   golden:'正月初六（公历X月X日）同学聚会在新荣记静安寺店，19:00。',
   skill:'农历→公历转换 + 事件检索',note:'农历换算是核心难点'},
  {id:'DJ-09',query:'下个月有哪些家人过生日？',level:'L4',sheet:'本机·日历',source:'系统日历',
   preset:'日历（下月）：X月3日妈妈生日、X月18日老婆生日（重复事件）',
   golden:'下月有2位家人过生日：\nX月3日：妈妈\nX月18日：老婆',
   skill:'下月时间范围 + 多事件聚合 + 关系人标注',note:'「家人」需过滤工作类事件'},
  {id:'BM-02',query:'煮溏心蛋要煮几分钟？',level:'L2',sheet:'本机·备忘录',source:'备忘录',
   preset:'备忘录标题「溏心蛋攻略」：水沸后放鸡蛋，煮6分30秒，立刻冰水冷却5分钟，剥壳后浸酱汁4小时',
   golden:'水沸后放蛋，煮6分30秒，然后冰水冷却5分钟。',
   skill:'主题模糊匹配 + 关键字段提取',note:'Query无明确标题，需语义匹配'},
  {id:'BM-04',query:'之前记的一家火锅店，名字里好像有个天字，是啥？',level:'L3',sheet:'本机·备忘录',source:'备忘录',
   preset:'备忘录「推荐餐厅」中有一条：小天鹅火锅（人民广场店）⭐⭐⭐⭐',

   skill:'模糊字符匹配（字形线索）+ 类目过滤',note:'模糊匹配，非精确标题命中'},
  {id:'BM-09',query:'帮我把这个月记过的账单汇总一下',level:'L4',sheet:'本机·备忘录',source:'备忘录',

  {id:'BM-11',query:'列出我近半年的产检记录，时间和主题就行',level:'L5',sheet:'本机·备忘录',source:'备忘录',
   preset:'备忘录近6个月，共7次产检记录，含时间戳和主题',

   skill:'半年时间范围 + 多条聚合 + 字段筛选输出',note:'时间范围长，需提取关键字段精简输出'},
  {id:'DX-01',query:'我高铁座位号是多少？',level:'L1',sheet:'本机·短信',source:'短信',
   preset:'短信来源12306：G123次，X月X日09:00上海→北京，5车厢12A座，订单号XXXXXX',

  {id:'DX-03',query:'今天回深圳是从虹桥出发吗？',level:'L2',sheet:'本机·短信',source:'短信',
   preset:'短信（12306）：G55次列车，今日16:30，上海虹桥→深圳北，8车厢03C座',
   golden:'是的，今天16:30从虹桥出发，G55次，8车厢03C座，终点深圳北。',

const STORAGE_KEY='taste_task_user_cases_v1';

function loadUserCases(){
  try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}
  catch(e){return [];}
}
function saveUserCases(cases){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(cases));}
  catch(e){}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function LevelBadge({level}){
  const s=LEVEL_STYLE[level]||{bg:'#f0f0f0',color:'#666'};
  return <span className="badge" style={{background:s.bg,color:s.color}}>{level}</span>;
}
function SheetBadge({sheet}){
  const c=SHEET_COLOR[sheet]||'#888';
  return <span className="badge" style={{background:c+'1a',color:c}}>{sheet}</span>;
}

function FlashCard({card,dragX,isDragging,onFlip,flipped}){
  const rot=dragX*0.05;
  const style={
    transform:`translateX(${dragX}px) rotate(${rot}deg)`,
    transition:isDragging?'none':'transform .3s cubic-bezier(.34,1.56,.64,1)',
    boxShadow:Math.abs(dragX)>20?'0 10px 36px rgba(0,0,0,.18)':'0 2px 16px rgba(0,0,0,.08)',
  };
  const leftOp=Math.min(1,Math.max(0,(-dragX-30)/80));
  const rightOp=Math.min(1,Math.max(0,(dragX-30)/80));
  return(
    <div className="card-main" style={style} onClick={onFlip}>
      <div className="swipe-indicator swipe-left-ind" style={{opacity:leftOp}}>✕</div>
      <div className="swipe-indicator swipe-right-ind" style={{opacity:rightOp}}>✓</div>
      <div className="card-header">
        <span style={{fontSize:11,fontWeight:500,color:'var(--text-tertiary)',fontFamily:'monospace',marginRight:'auto'}}>{card.id}</span>
        <LevelBadge level={card.level}/>
        <SheetBadge sheet={card.sheet}/>
        {card.userAdded&&<span className="badge" style={{background:'var(--accent-light)',color:'var(--accent)'}}>自添加</span>}
      </div>
      {!flipped?(
        <div className="card-body">
          <div className="card-query">{card.query}</div>
          {card.imageData&&<img src={card.imageData} className="card-img" alt="case附图"/>}
          <p className="card-hint">点击查看答案 · 左右拖动滑过</p>
        </div>
      ):(
        <div className="card-body" style={{overflowY:'auto'}}>
          <div className="card-answer-section">
            <div className="card-answer-label">预设数据</div>
            <div className="card-answer-text" style={{fontSize:12}}>{card.preset}</div>
          </div>
          <div className="card-answer-section">
            <div className="card-answer-label">Golden Answer</div>
            <div className="card-answer-text">{card.golden}</div>
          </div>
        </div>
      )}
      <div className="card-footer">
        <span>📍 {card.source}</span>
        <span style={{marginLeft:'auto',maxWidth:'55%',textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>🎯 {card.skill}</span>
      </div>
    </div>
  );
}

function CardsView({cases}){
  const [dismissed,setDismissed]=useState(new Set());
  const [flipped,setFlipped]=useState(false);
  const [dragX,setDragX]=useState(0);
  const [isDragging,setIsDragging]=useState(false);
  const startX=useRef(0);
  const active=cases.filter(c=>!dismissed.has(c.id));
  const card=active[0];

  const dismiss=useCallback(()=>{
    if(!card)return;
    setDismissed(d=>new Set([...d,card.id]));
    setFlipped(false);setDragX(0);
  },[card]);
  const undo=useCallback(()=>{
    const arr=[...dismissed];if(!arr.length)return;
    const last=arr[arr.length-1];
    setDismissed(d=>{const nd=new Set(d);nd.delete(last);return nd;});
    setFlipped(false);
  },[dismissed]);
  const reset=()=>{setDismissed(new Set());setFlipped(false);setDragX(0);};

  useEffect(()=>{setFlipped(false);},[card?.id]);

  const onDown=e=>{startX.current=e.touches?e.touches[0].clientX:e.clientX;setIsDragging(true);};
  const onMove=e=>{
    if(!isDragging)return;
    const x=(e.touches?e.touches[0].clientX:e.clientX)-startX.current;
    setDragX(x);
  };
  const onUp=()=>{
    setIsDragging(false);
    if(dragX<-100){setDragX(-700);setTimeout(()=>{dismiss();setDragX(0);},280);}
    else if(dragX>100){setDragX(700);setTimeout(()=>{dismiss();setDragX(0);},280);}
    else setDragX(0);
  };

  const total=cases.length,done=dismissed.size,pct=total?done/total:0;
  return(
    <div className="card-area">
      <div className="progress-bar"><div className="progress-fill" style={{width:pct*100+'%'}}/></div>
      <div className="progress-text">{done} / {total} 已查看</div>
      <div className="card-stack"
        onMouseDown={onDown} onMouseMove={isDragging?onMove:null} onMouseUp={onUp} onMouseLeave={isDragging?onUp:null}
        onTouchStart={onDown} onTouchMove={onMove} onTouchEnd={onUp}>
        {active.length>2&&<div className="card-behind card-behind-2"/>}
        {active.length>1&&<div className="card-behind card-behind-1"/>}
        {card
          ?<FlashCard card={card} dragX={dragX} isDragging={isDragging} onFlip={()=>setFlipped(f=>!f)} flipped={flipped}/>
          :<div className="done-card">
            <div className="done-emoji">🎉</div>
            <div className="done-title">全部 {total} 条看完了</div>
            <div className="done-sub">今日练习完成</div>
            <button className="reset-btn" onClick={reset} style={{marginTop:8}}>重新开始</button>
          </div>}
      </div>
      <div className="controls">
        <button className="ctrl-btn" onClick={undo} title="撤回">↩</button>
        <button className="ctrl-btn primary" onClick={()=>setFlipped(f=>!f)} title="翻面">
          {flipped?'🙈':'👁'}
        </button>
        <button className="ctrl-btn" onClick={dismiss} title="下一张">→</button>
      </div>
      {card&&<div style={{marginTop:14,fontSize:12,color:'var(--text-tertiary)',textAlign:'center',maxWidth:520,lineHeight:1.7}}>
        备注：{card.note}
      </div>}
    </div>
  );
}

function TableView({cases}){
  const [lvFilter,setLvFilter]=useState('all');
  const [shFilter,setShFilter]=useState('all');
  const [expanded,setExpanded]=useState(null);
  const sheets=[...new Set(cases.map(c=>c.sheet))];
  const filtered=cases.filter(c=>(lvFilter==='all'||c.level===lvFilter)&&(shFilter==='all'||c.sheet===shFilter));
  return(
    <div className="table-wrap">
      <div className="filter-row">
        <select className="filter-select" value={lvFilter} onChange={e=>setLvFilter(e.target.value)}>
          <option value="all">全部等级</option>
          {['L1','L2','L3','L4','L5'].map(l=><option key={l}>{l}</option>)}
        </select>
        <select className="filter-select" value={shFilter} onChange={e=>setShFilter(e.target.value)}>
          <option value="all">全部来源</option>
          {sheets.map(s=><option key={s}>{s}</option>)}
        </select>
        <span style={{fontSize:12,color:'var(--text-tertiary)',marginLeft:'auto'}}>{filtered.length} 条</span>
      </div>
      <div className="tbl-container">
        <table className="tbl">
          <thead>
            <tr>
              <th style={{width:80}}>编号</th>
              <th style={{width:56}}>等级</th>
              <th>查询 Query</th>
              <th style={{width:110}}>数据源</th>
              <th style={{width:72}}>详情</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(c=>[
              <tr key={c.id}>
                <td style={{fontFamily:'monospace',fontSize:11,color:'var(--text-secondary)'}}>
                  {c.userAdded&&<span className="user-dot"/>}{c.id}
                </td>
                <td><LevelBadge level={c.level}/></td>
                <td style={{fontWeight:500}}>{c.query}</td>
                <td><SheetBadge sheet={c.sheet}/></td>
                <td><button className="expand-btn" onClick={()=>setExpanded(expanded===c.id?null:c.id)}>{expanded===c.id?'收起':'展开'}</button></td>
              </tr>,
              expanded===c.id&&<tr key={c.id+'_d'}>
                <td colSpan={5} style={{padding:0,borderBottom:'1px solid var(--border-light)'}}>
                  <div className="expand-detail">
                    <div className="expand-grid">
                      <div>
                        <div className="expand-label">预设数据</div>
                        <div className="expand-val">{c.preset}</div>
                      </div>
                      <div>
                        <div className="expand-label">Golden Answer</div>
                        <div className="expand-val">{c.golden}</div>
                      </div>
                      <div>
                        <div className="expand-label">考察能力</div>
                        <div className="expand-val">{c.skill}</div>
                      </div>
                      <div>
                        <div className="expand-label">难点备注</div>
                        <div className="expand-val">{c.note}</div>
                      </div>
                      {c.imageData&&<div style={{gridColumn:'1/-1'}}>
                        <div className="expand-label">附图</div>
                        <img src={c.imageData} style={{maxWidth:220,borderRadius:8,marginTop:4}} alt=""/>
                      </div>}
                    </div>
                  </div>
                </td>
              </tr>
            ])}
          </tbody>
        </table>
        {filtered.length===0&&<div className="empty">没有符合条件的用例</div>}
      </div>
    </div>
  );
}

function AddView({onAdd}){
  const [form,setForm]=useState({query:'',level:'L1',sheet:'对话记忆',source:'',preset:'',golden:'',skill:'',note:''});
  const [img,setImg]=useState(null);
  const fileRef=useRef();
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>setImg(ev.target.result);r.readAsDataURL(f);
  };
  const submit=()=>{
    if(!form.query.trim()){showToast('请填写查询 Query');return;}
    if(!form.golden.trim()){showToast('请填写期望输出');return;}
    onAdd({...form,id:'USR-'+Date.now(),userAdded:true,imageData:img||null});
    setForm({query:'',level:'L1',sheet:'对话记忆',source:'',preset:'',golden:'',skill:'',note:''});
    setImg(null);
    showToast('✓ 已添加到测试集');
  };
  return(
    <div className="add-wrap">
      <div className="add-section-title">添加新用例</div>
      <div className="add-form">
        <div className="form-group">
          <label className="form-label">查询 Query <span className="req">*</span></label>
          <input className="form-input" value={form.query} onChange={e=>set('query',e.target.value)} placeholder="用户实际的说话内容，尽量口语化"/>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">查询等级</label>
            <select className="form-select" value={form.level} onChange={e=>set('level',e.target.value)}>
              {['L1','L2','L3','L4','L5'].map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">所属数据源</label>
            <select className="form-select" value={form.sheet} onChange={e=>set('sheet',e.target.value)}>
              {SHEET_OPTIONS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">具体来源（如：12306短信、系统日历等）</label>
          <input className="form-input" value={form.source} onChange={e=>set('source',e.target.value)} placeholder="例：系统日历、备忘录"/>
        </div>
        <div className="form-group">
          <label className="form-label">预设数据内容</label>
          <textarea className="form-textarea" value={form.preset} onChange={e=>set('preset',e.target.value)} placeholder="触发这条 query 所需系统中预先存在的数据"/>
        </div>
        <div className="form-group">
          <label className="form-label">期望输出 Golden Answer <span className="req">*</span></label>
          <textarea className="form-textarea" value={form.golden} onChange={e=>set('golden',e.target.value)} placeholder="AI 应该给出的标准回答或关键要素"/>
        </div>
        <div className="form-row">
          <div className="form-group">
            <label className="form-label">考察能力点</label>
            <input className="form-input" value={form.skill} onChange={e=>set('skill',e.target.value)} placeholder="例：模糊匹配 + 字段提取"/>
          </div>
          <div className="form-group">
            <label className="form-label">难点 / 备注</label>
            <input className="form-input" value={form.note} onChange={e=>set('note',e.target.value)} placeholder="易失败点说明"/>
          </div>
        </div>
        <div className="form-group">
          <label className="form-label">截图 / 附图（可选）</label>
          <div className="upload-zone" onClick={()=>fileRef.current.click()}>
            {img
              ?<img src={img} className="card-img-prev" alt="preview"/>
              :<><div className="up-icon">📎</div><p>点击上传截图、失败案例图片</p><p className="sub">支持 JPG · PNG · WEBP</p></>}
          </div>
          <input ref={fileRef} type="file" accept="image/*" style={{display:'none'}} onChange={handleFile}/>
        </div>
        <button className="submit-btn" onClick={submit}>+ 添加到测试集</button>
      </div>
    </div>
  );
}

function StatsRow({cases}){
  const byL=l=>cases.filter(c=>c.level===l).length;
  const labels={L1:'直接召回',L2:'模糊单跳',L3:'多跳推理',L4:'聚合归类'};
  return(
    <div className="stat-row">
      {['L1','L2','L3','L4'].map(l=>(
        <div key={l} className="stat-card">
          <div className="n" style={{color:LEVEL_STYLE[l].color}}>{byL(l)}</div>
          <div className="l">{l} · {labels[l]}</div>
        </div>
      ))}
    </div>
  );
}

function App(){
  const [tab,setTab]=useState('cards');
  const [userCases,setUserCases]=useState(()=>loadUserCases());
  const cases=[...PRESET,...userCases];

  const addCase=useCallback(c=>{
    setUserCases(prev=>{const next=[...prev,c];saveUserCases(next);return next;});
    setTab('cards');
  },[]);

  const tabs=[{id:'cards',label:'闪卡练习'},{id:'table',label:'测试集总览'},{id:'add',label:'+ 添加用例'}];
  return(
    <div className="app">
      <div className="nav">
        <span className="nav-title">记忆测试集</span>
        {tabs.map(t=><button key={t.id} className={`nav-btn${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>
      {tab!=='add'&&<StatsRow cases={cases}/>}
      {tab==='cards'&&<CardsView cases={cases}/>}
      {tab==='table'&&<TableView cases={cases}/>}
      {tab==='add'&&<AddView onAdd={addCase}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
